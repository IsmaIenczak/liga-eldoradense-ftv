{% extends "base.html" %}

{% block content %}
<h2>Editar Atleta</h2>

{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    {% for category, message in messages %}
      <p style="color: {% if category == 'error' %}red{% else %}green{% endif %};">
        {{ message }}
      </p>
    {% endfor %}
  {% endif %}
{% endwith %}

<form method="POST">

    <label>Nome:</label>
    <input type="text" name="nome" value="{{ atleta.nome }}" required>
    <br><br>

    <label>CPF:</label>
    <input type="text" name="cpf" value="{{ atleta.cpf }}" required>
    <br><br>

    <label>Sexo:</label>
    <select name="sexo" required>
        <option value="masculino" {% if atleta.sexo == "masculino" %}selected{% endif %}>
            Masculino
        </option>
        <option value="feminino" {% if atleta.sexo == "feminino" %}selected{% endif %}>
            Feminino
        </option>
    </select>
    <br><br>

    <label>Nível:</label>
    <select name="nivel" required>
        <option value="iniciante" {% if atleta.nivel == "iniciante" %}selected{% endif %}>
            Iniciante
        </option>
        <option value="intermediario" {% if atleta.nivel == "intermediario" %}selected{% endif %}>
            Intermediário
        </option>
        <option value="avancado" {% if atleta.nivel == "avancado" %}selected{% endif %}>
            Avançado
        </option>
    </select>
    <br><br>

    <button type="submit">Salvar Alterações</button>

</form>

{% endblock %}
