{% extends "base.html" %}

{% block content %}
<h2>Editar Categoria</h2>

{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    {% for category, message in messages %}
      <p style="color: {% if category == 'error' %}red{% else %}green{% endif %};">
        {{ message }}
      </p>
    {% endfor %}
  {% endif %}
{% endwith %}

<form method="POST">

    <label>Modalidade:</label>
    <select name="modalidade" required>
        <option value="Masculino" {% if categoria.modalidade == "Masculino" %}selected{% endif %}>
            Masculino
        </option>
        <option value="Feminino" {% if categoria.modalidade == "Feminino" %}selected{% endif %}>
            Feminino
        </option>
        <option value="Misto" {% if categoria.modalidade == "Misto" %}selected{% endif %}>
            Misto
        </option>
    </select>

    <br><br>

    <label>Nível:</label>
    <select name="nivel" required>
        <option value="Iniciante" {% if categoria.nivel == "Iniciante" %}selected{% endif %}>
            Iniciante
        </option>
        <option value="Intermediario" {% if categoria.nivel == "Intermediario" %}selected{% endif %}>
            Intermediário
        </option>
        <option value="Avancado" {% if categoria.nivel == "Avancado" %}selected{% endif %}>
            Avançado
        </option>
    </select>

    <br><br>

    <label>Evento:</label>
    <select name="evento" required>
        {% for evento in eventos %}
            <option value="{{ evento.id }}" {% if categoria.evento_id == evento.id %}selected{% endif %}>
                {{ evento.nome }}
            </option>
        {% endfor %}
    </select>

    <br><br>

    <button type="submit">Salvar Alterações</button>
</form>
{% endblock %}
