{% extends "base.html" %}

{% block content %}
<h2>Editar Categoria</h2>

{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    {% for category, message in messages %}
      <p style="color: {% if category == 'error' %}red{% else %}green{% endif %};">
        {{ message }}
      </p>
    {% endfor %}
  {% endif %}
{% endwith %}

<form method="POST">

    <label>Modalidade:</label>
    <select name="modalidade" required>
        <option value="masculino" {% if categoria.modalidade == "masculino" %}selected{% endif %}>Masculino</option>
        <option value="feminino" {% if categoria.modalidade == "feminino" %}selected{% endif %}>Feminino</option>
        <option value="misto" {% if categoria.modalidade == "misto" %}selected{% endif %}>Misto</option>
    </select>

    <br><br>

    <label>Nível:</label>
    <select name="nivel" required>
    {% for nivel in niveis %}
        <option value="{{ nivel.id }}" {% if categoria.nivel_id == nivel.id %}selected{% endif %}>
            {{ nivel.nome }}
        </option>
    {% endfor %}
    </select>
    

    <br><br>

    <label>Número de vagas:</label>
    <input type="number" name="vagas" value="{{ categoria.vagas }}" min="4" step="2" required>

    <br><br>

    <label>Evento:</label>
    <select name="evento" required>
        {% for evento in eventos %}
            <option value="{{ evento.id }}" {% if categoria.evento_id == evento.id %}selected{% endif %}>
                {{ evento.nome }}
            </option>
        {% endfor %}
    </select>

    <br><br>

    <button type="submit">Salvar Alterações</button>
</form>
{% endblock %}
