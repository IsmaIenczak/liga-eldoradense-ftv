{% extends "base.html" %}

{% block content %}
<h2>Editar Nível</h2>

{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    {% for category, message in messages %}
      <p style="color: {% if category == 'error' %}red{% else %}green{% endif %};">
        {{ message }}
      </p>
    {% endfor %}
  {% endif %}
{% endwith %}

<form method="POST">
    <label for="nome">Nome do nível:</label>
    <input type="text" id="nome" name="nome" value="{{ nivel.nome }}" required>

    <br><br>

    <button type="submit">Salvar Alterações</button>
</form>
{% endblock %}
