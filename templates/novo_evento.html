{% extends "base.html" %}

{% block content %}
<h2>Novo Evento</h2>

<form method="POST">
    <label>Nome do Evento:</label>
    <input type="text" name="nome" required><br><br>

    <label>Data:</label>
    <input type="date" name="data" required><br><br>

    <label>Nome da Arena:</label>
    <input type="text" name="arena" required><br><br>

    <label>Rua:</label>
    <input type="text" name="rua" required><br><br>

    <label>Cidade:</label>
    <input type="text" name="cidade" required><br><br>

    <label>Número:</label>
    <input type="text" name="numero" inputmode="numeric" required><br><br>

    <label>CEP:</label>
    <input type="text" name="cep" maxlength="8" required><br><br>

    <button type="submit">Cadastrar Evento</button>
</form>
{% endblock %}
