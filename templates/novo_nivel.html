{% extends "base.html" %}

{% block content %}
<h2>Novo Nível</h2>

{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    {% for category, message in messages %}
      <p style="color: {% if category == 'error' %}red{% else %}green{% endif %};">
        {{ message }}
      </p>
    {% endfor %}
  {% endif %}
{% endwith %}

<form method="POST">
    <label>Nome do nível:</label>
    <input type="text" name="nome" required>
    <br><br>
    <button type="submit">Cadastrar Nível</button>
</form>
{% endblock %}
